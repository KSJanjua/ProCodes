# Phase 2 (Instance Depth Layer Prediction) -- isolated re-run for the DAv2
# pipeline (run_name changed only; Phase 2's Swin-L backbone is independent
# of Phase 1's encoder choice, so this is otherwise identical to
# phase2_mask2former.yaml). Kept as its own file so both training and
# evaluation can just point at "this config" without needing --override /
# --run-name plumbing, and so runs/phase2_dav2/ never touches runs/phase2_run/
# or runs/phase2_mask2former/.

run_name: "phase2_dav2"
run_root: "runs"
seed: 2026

model:
  checkpoint: "facebook/mask2former-swin-large-coco-instance"
  checkpoint_dir: "/home/work/intern_storage/Ayush/weights/mask2former-swin-large-coco-instance"
  allow_hub_download: false
  num_classes: 1
  num_queries: 100   # reduced from the checkpoint's 200; ample for this dataset, halves the query budget

matcher:
  cost_class: 2.0
  cost_mask: 5.0
  cost_dice: 5.0
  cost_depth: 1.0
  num_points: 12544

loss:
  eos_coef: 0.1
  oversample_ratio: 3.0
  importance_sample_ratio: 0.75
  weight_class: 2.0
  weight_mask: 5.0
  weight_dice: 5.0
  weight_depth: 1.0

data:
  annotations_root: "gid_custom"
  image_size: [736, 1280]
  min_instance_px: 64
  hflip_prob: 0.5
  color_jitter: 0.0

optim:
  lr: 1.0e-4
  backbone_lr_mult: 0.1
  weight_decay: 0.05
  total_iters: 20000
  warmup_iters: 500
  poly_power: 0.9
  grad_clip_norm: 0.1
  precision: "bf16"
  batch_size: 2
  num_workers: 4
  log_every: 50
  ckpt_every: 1000
  eval_every: 2000
