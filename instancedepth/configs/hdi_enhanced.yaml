# Phase 1 (Holistic Depth Initialization) -- "enhanced" profile.
#
# Identical to hdi.yaml except the canonical-disparity auxiliary loss is
# turned on. This is a deliberate, documented deviation from the paper (see
# a deliberate, documented deviation from the paper, never used as the
# baseline for paper comparisons.
#
# camera.focal_px / camera.width_px only ever enter the code as the ratio
# focal_px/width_px (see instancedepth/utils/camera.py's
# depth_to_canonical_disparity) -- that ratio is resolution-independent, so
# these two values just need to come from the SAME reference frame as each
# other (e.g. both from the native camera calibration); they do NOT need to
# match data.image_size's resized width below.

run_name: "hdi_enhanced"
run_root: "runs"
seed: 2026

backbone:
  name: "facebook/dinov2-large"
  checkpoint_path: "/home/work/intern_storage/Ayush/weights/dinov2_vitl14.safetensors"
  hook_layers: [23, 14, 5]
  freeze: false
  allow_hub_download: false

decoder:
  target_fractions: [0.125, 0.25, 0.5]
  patch_kernels: [4, 8, 16]
  channels_dec: 256
  channels_attn: 256
  attn_heads: 8
  attn_blocks: 1

bins:
  rd: 5
  max_depth: 10.0

camera:
  focal_px: 860.0
  width_px: 2208
  source: "config"

loss:
  regression: "silog"
  silog_lambda: 0.5
  deep_supervision_weights: [0.5, 0.25]
  bin_bce_weight: 1.0
  disparity_aux_weight: 0.5   # enabled
  gradient_matching_weight: 0.5   # sharpen depth edges (Eigen 2015 / MiDaS L_reg);
                                 # SigLog is pointwise and cannot penalize blur
  gradient_matching_scales: 4

data:
  annotations_root: "gid_custom"
  image_size: [728, 1288]
  min_instance_px: 64
  hflip_prob: 0.5
  color_jitter: 0.0

optim:
  lr: 1.0e-5
  backbone_lr_mult: 1.0
  head_lr_mult: 10.0
  weight_decay: 0.01
  total_iters: 55000
  warmup_iters: 500
  poly_power: 0.9
  grad_clip_norm: 2.0
  precision: "bf16"
  batch_size: 4
  num_workers: 4
  log_every: 50
  ckpt_every: 1000
  eval_every: 2000
