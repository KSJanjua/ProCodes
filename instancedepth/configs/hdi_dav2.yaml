# Phase 1 (Holistic Depth Initialization) -- Depth-Anything-V2-encoder profile.
#
# Identical to the paper-faithful hdi.yaml EXCEPT the backbone is initialized
# from Depth Anything V2's DINOv2 encoder (depth-fine-tuned) instead of the
# vanilla self-supervised DINOv2. This matches the encoder actually behind the
# InstanceDepth paper's *reported* holistic-stage numbers: Sec. 5.3's ablation
# baseline uses "a Depth Anything V2 pretrained encoder", and the paper's
# headline Table 2 result is byte-identical to Table 4's DAv2-based
# "Baseline+H+I" -- so the DAv2 encoder, not vanilla DINOv2, is what produced
# the numbers to compare against (despite Sec. 4.3's prose citing DINOv2).
#
# The wrapper auto-detects the DAv2 checkpoint format (encoder under a
# 'pretrained.' prefix + a DPT depth_head it discards) -- no code flag needed,
# just point backbone.checkpoint_path at the .pth. See
# instancedepth/models/backbone/dinov2_wrapper.py::_convert_dav2_encoder_state_dict.
#
# Disparity aux loss is ON (1.2, same investigated near-field addition as
# hdi_enhanced.yaml) -- NOT a clean apples-to-apples comparison against the
# paper's holistic-stage rows in that case; drop to 0.0 for that comparison.
# Camera intrinsics (focal_px/width_px) are REQUIRED whenever
# disparity_aux_weight > 0 (HDIConfig.__post_init__ asserts this) -- reused
# verbatim from hdi_enhanced.yaml's values (same physical camera/dataset).

run_name: "hdi_dav2"
run_root: "runs"
seed: 2026

backbone:
  name: "facebook/dinov2-large"   # architecture only -- DAv2's encoder IS DINOv2 ViT-L/14
  checkpoint_path: "/home/work/intern_storage/Ayush/weights/depth_anything_v2_vitl.pth"
  hook_layers: [5, 14, 23]
  freeze: false
  allow_hub_download: false

decoder:
  target_fractions: [0.125, 0.25, 0.5]
  patch_kernels: [16, 8, 4]
  channels_dec: 256
  channels_attn: 256
  attn_heads: 8
  attn_blocks: 1

bins:
  rd: 5
  max_depth: 10.0

camera:
  focal_px: 860.0
  width_px: 2208
  source: "config"

loss:
  regression: "silog"
  silog_lambda: 0.5
  deep_supervision_weights: [0.5, 0.25]
  bin_bce_weight: 1.0
  disparity_aux_weight: 1.2

data:
  annotations_root: "gid_custom"
  image_size: [728, 1288]
  min_instance_px: 64
  hflip_prob: 0.5
  color_jitter: 0.0

optim:
  lr: 1.0e-5
  backbone_lr_mult: 1.0
  head_lr_mult: 10.0
  weight_decay: 0.01
  total_iters: 55000
  warmup_iters: 0
  poly_power: 0.9
  grad_clip_norm: 1.0
  precision: "bf16"
  grad_checkpointing: false
  batch_size: 4
  num_workers: 4
  log_every: 50
  ckpt_every: 1000
  eval_every: 2000
